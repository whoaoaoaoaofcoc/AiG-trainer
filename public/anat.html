<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Анатомия человека — Тренажёр</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
.header{background:linear-gradient(135deg,#7c2d12,#c2410c);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:700}
.header p{font-size:12px;opacity:.8;margin-top:2px}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e2e8f0}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-size:14px;font-weight:600;color:#64748b;border:none;background:none;transition:.2s}
.tab.active{color:#c2410c;border-bottom:2px solid #c2410c;margin-bottom:-2px}
.pane{display:none;padding:16px;max-width:800px;margin:0 auto}
.pane.active{display:block}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.sem-row{display:flex;gap:6px;margin-bottom:12px}
.sem-btn{flex:1;padding:9px 8px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-weight:600;color:#64748b;background:#fff;cursor:pointer;transition:.2s}
.sem-btn.active{background:linear-gradient(135deg,#7c2d12,#c2410c);color:#fff;border-color:transparent}
.sem-btn:disabled{opacity:.4;cursor:not-allowed}
select,textarea,input{padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;outline:none;background:#fff}
select:focus,textarea:focus{border-color:#c2410c}
textarea{width:100%;resize:vertical;min-height:100px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:#c2410c;color:#fff}
.btn-primary:hover{background:#9a3412}
.btn-primary:disabled{background:#fdba8c;cursor:not-allowed}
.btn-secondary{background:#f1f5f9;color:#475569}
.btn-secondary:hover{background:#e2e8f0}
.q-card{background:linear-gradient(135deg,#fff7ed,#ffedd5);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid #c2410c}
.q-num{font-size:12px;font-weight:700;color:#c2410c;margin-bottom:4px}
.q-text{font-size:15px;font-weight:600;color:#1e293b;line-height:1.5}
.resp-area{background:#fff;border-radius:10px;padding:14px;border:1px solid #e2e8f0;margin-top:12px}
.resp-body{line-height:1.7;font-size:14px;word-wrap:break-word}
.resp-body h3,.resp-body h4{font-weight:700;margin:10px 0 4px;color:#7c2d12}
.resp-body ul,.resp-body ol{padding-left:20px;margin:6px 0}
.resp-body li{margin:3px 0}
.resp-body table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
.resp-body th { background: #7c2d12; color: white; padding: 7px 10px; text-align: left; font-weight: 600; }
.resp-body td { border: 1px solid #cbd5e1; padding: 6px 10px; vertical-align: top; }
.resp-body tr:nth-child(even) { background: #fff7ed; }
.resp-body blockquote { border-left: 3px solid #c2410c; padding: 4px 12px; margin: 8px 0; background: #fff7ed; border-radius: 0 6px 6px 0; }
.loading{text-align:center;padding:20px;color:#64748b;font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:#c2410c;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.stats{background:#f8fafc;border-radius:8px;padding:10px 14px;font-size:13px;color:#475569;margin-bottom:12px;display:flex;gap:16px}
.ref-stats{background:#f8fafc;border-radius:8px;padding:8px 14px;font-size:12px;color:#475569;margin-bottom:10px;display:flex;gap:14px;flex-wrap:wrap}
.rst-item{display:flex;flex-direction:column;align-items:center;min-width:50px}
.rst-val{font-size:16px;font-weight:700;color:#7c2d12;line-height:1.2}
.rst-val.green{color:#16a34a}.rst-val.yellow{color:#d97706}.rst-val.red{color:#dc2626}
.rst-lbl{font-size:10px;color:#94a3b8;text-transform:uppercase;margin-top:1px}
.sr-row{display:flex;gap:8px;margin:14px 0 0;flex-wrap:wrap;align-items:center;padding-top:12px;border-top:1px solid #f1f5f9}
.sr-label{font-size:12px;color:#64748b;font-weight:600;margin-right:2px}
.sr-btn{padding:7px 14px;border-radius:8px;border:2px solid;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;background:white}
.sr-know{border-color:#16a34a;color:#15803d}.sr-know:hover,.sr-know.sel{background:#16a34a;color:white}
.sr-unsure{border-color:#d97706;color:#b45309}.sr-unsure:hover,.sr-unsure.sel{background:#d97706;color:white}
.sr-no{border-color:#dc2626;color:#b91c1c}.sr-no:hover,.sr-no.sel{background:#dc2626;color:white}
.hidden{display:none!important}
.sources-block { margin-top:16px; padding-top:14px; border-top:1px solid #e2e8f0; }
.sources-block h5 { font-size:12px; font-weight:700; color:#64748b; margin-bottom:8px; letter-spacing:.5px; text-transform:uppercase; }
.sources-block a { display:inline-flex; align-items:center; gap:4px; margin:2px 4px 2px 0; padding:3px 10px; background:#f1f5f9; border-radius:20px; font-size:12px; color:#7c2d12; text-decoration:none; font-weight:600; border:1px solid #e2e8f0; transition:.15s; }
.sources-block a:hover { background:#ffedd5; border-color:#fdba8c; }
/* ── Картинки из рабочих тетрадей (статичные, надёжные) ──────── */
.img-gallery { margin-top:16px; padding-top:14px; border-top:1px solid #e2e8f0; }
.img-gallery h5 { font-size:12px; font-weight:700; color:#64748b; margin-bottom:10px; letter-spacing:.5px; text-transform:uppercase; }
.img-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
.img-grid figure { margin:0; cursor:pointer; }
.img-grid img { width:100%; aspect-ratio:3/4; object-fit:contain; min-height:120px; border-radius:8px; border:1px solid #e2e8f0; display:block; background:#fff; transition:.15s; }
.img-grid img:hover { border-color:#c2410c; transform:scale(1.02); }
.img-grid figcaption { font-size:11px; color:#94a3b8; text-align:center; margin-top:4px; }
#img-lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:10050; align-items:center; justify-content:center; padding:16px; }
#img-lightbox.open { display:flex; }
.lb-inner { display:flex; gap:16px; max-width:96vw; max-height:94vh; background:#1c1410; border-radius:12px; overflow:hidden; }
@media(max-width:700px) { .lb-inner { flex-direction:column; max-height:90vh; overflow-y:auto; } }
.lb-imgwrap { display:flex; align-items:center; justify-content:center; padding:12px; cursor:zoom-out; flex-shrink:0; }
#img-lightbox img { max-width:88vw; max-height:90vh; border-radius:8px; object-fit:contain; }
@media(min-width:701px) { #img-lightbox img { max-width:60vw; } }
.lb-legend { background:#fff; padding:16px; overflow-y:auto; min-width:260px; max-width:340px; flex-shrink:0; }
.lb-legend h5 { font-size:12px; font-weight:700; color:#7c2d12; margin-bottom:8px; text-transform:uppercase; letter-spacing:.5px; }
.lb-legend table { width:100%; border-collapse:collapse; font-size:12px; }
.lb-legend td { padding:3px 6px; border-bottom:1px solid #f1f5f9; vertical-align:top; }
.lb-legend td.lb-num { font-weight:700; color:#c2410c; width:20px; }
.lb-legend td.lb-lat { color:#94a3b8; font-style:italic; max-width:90px; }
.lb-legend table { table-layout:fixed; }
.lb-legend tr.lb-group td { font-weight:700; color:#7c2d12; background:#fff7ed; padding-top:8px; }
.lb-close { position:absolute; top:10px; right:14px; background:rgba(255,255,255,.15); color:#fff; border:none; border-radius:50%; width:32px; height:32px; font-size:18px; cursor:pointer; z-index:10051; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
/* ── Term tooltip ─────────────────────────────────────────── */
/* ── Explain button & panel ─────────────────────────────── */
#explain-btn {
  position: fixed; display: none; z-index: 9100;
  background: #c2410c; color: #fff; border: none;
  border-radius: 20px; padding: 5px 13px; font-size: 12px;
  cursor: pointer; font-weight: 700; box-shadow: 0 4px 14px rgba(0,0,0,.4);
  white-space: nowrap; transition: opacity .15s;
}
#explain-panel {
  position: fixed; top: 0; right: -440px; width: min(400px, 100vw);
  height: 100vh; background: #1c0a02; color: #ffedd5;
  z-index: 10001; box-shadow: -6px 0 40px rgba(0,0,0,.7);
  display: flex; flex-direction: column;
  transition: right .3s cubic-bezier(.25,.46,.45,.94);
  border-left: 1px solid #7c2d12;
}
#explain-panel.open { right: 0; }
#explain-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 10000;
}
</style>

</head>
<body>

<div class="header">
  <div style="font-size:32px">🦴</div>
  <div>
    <a href="/" style="display:inline-block;font-size:12px;color:#fdba8c;text-decoration:none;background:rgba(253,186,140,0.15);border:1px solid rgba(253,186,140,0.3);border-radius:6px;padding:3px 10px;margin-bottom:4px;">← Меню</a>
    <h1>Анатомия человека</h1>
    <p>НГМУ · 1-2 семестр · по Привесу и темам кафедры</p>
  </div>
</div>

    <div id="ai-counter" style="font-size:11px;color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.1);border-radius:8px;padding:3px 10px;align-self:center">🤖 —/50</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('ref',this)">📚 Справочник по темам</button>
  <button class="tab" onclick="switchTab('exam',this)">🤝 Помощь друга</button>
</div>

<!-- СПРАВОЧНИК -->
<div id="pane-ref" class="pane active">
  <div class="card">
    <div class="ref-stats">
      <div class="rst-item"><div class="rst-val" id="rs-total">0</div><div class="rst-lbl">Всего</div></div>
      <div class="rst-item"><div class="rst-val" id="rs-seen">0</div><div class="rst-lbl">Просмотрено</div></div>
      <div class="rst-item"><div class="rst-val green" id="rs-know">0</div><div class="rst-lbl">✓ Знаю</div></div>
      <div class="rst-item"><div class="rst-val yellow" id="rs-unsure">0</div><div class="rst-lbl">~ Не уверен</div></div>
      <div class="rst-item"><div class="rst-val red" id="rs-noknow">0</div><div class="rst-lbl">✗ Не знаю</div></div>
    </div>
    <div class="sem-row" id="sem-row"></div>
    <div class="filter-row">
      <select id="ref-select" onchange="onQSelect()" style="flex:1">
        <option value="">— выберите тему —</option>
      </select>
    </div>
    <div id="ref-q-display" class="hidden">
      <div class="q-card">
        <div class="q-num" id="ref-q-num"></div>
        <div class="q-text" id="ref-q-text"></div>
      </div>
      <button class="btn btn-primary" id="ref-btn" onclick="getAnswer()">📚 Получить материал по теме</button>
    </div>
  </div>
  <div id="ref-resp-area" class="card hidden">
    <div style="font-size:13px;font-weight:700;color:#7c2d12;margin-bottom:8px">📋 Материал по теме (Привес + рабочая тетрадь кафедры)</div>
    <div id="ref-loading" class="loading hidden"><span class="spinner"></span>Готовлю материал…</div>
    <div id="ref-resp-body" class="resp-body"></div>
    <div class="sr-row hidden" id="sr-row">
      <span class="sr-label">Как знаешь?</span>
      <button class="sr-btn sr-no" id="sr-btn-1" onclick="rateSR(1)">✗ Не знаю</button>
      <button class="sr-btn sr-unsure" id="sr-btn-2" onclick="rateSR(2)">~ Не уверен</button>
      <button class="sr-btn sr-know" id="sr-btn-3" onclick="rateSR(3)">✓ Знаю</button>
    </div>
  </div>
</div>

<!-- ПОМОЩЬ ДРУГА — ЧАТ -->
<div id="pane-exam" class="pane">
  <div class="card" style="display:flex;flex-direction:column">
    <div style="font-size:13px;font-weight:700;color:#7c2d12;margin-bottom:12px">🤝 Помощь друга — спроси что угодно по анатомии</div>
    <div id="chat-history" style="min-height:120px;max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:12px"></div>
    <div id="chat-loading" class="loading hidden"><span class="spinner"></span>Думаю…</div>
    <div style="display:flex;gap:8px;align-items:flex-end;margin-top:4px">
      <textarea id="chat-input" placeholder="Например: объясни строение клиновидной кости, или какой нерв проходит через круглое отверстие?" style="flex:1;resize:vertical;min-height:56px;max-height:150px;font-size:14px" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
      <button class="btn btn-primary" id="chat-btn" onclick="sendChat()" style="white-space:nowrap">💬 Спросить</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX для увеличения картинок -->
<div id="img-lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lb-inner">
    <div class="lb-imgwrap" onclick="closeLightbox()"><img id="img-lightbox-img" src="" alt=""></div>
    <div class="lb-legend" id="img-lightbox-legend"></div>
  </div>
</div>

<script>
// Magic invite link — redirect to main page for registration
(function() {
  const params = new URLSearchParams(window.location.search);
  const inv = params.get('invite');
  if (inv) window.location.href = '/?invite=' + encodeURIComponent(inv);
})();

// ─── Auth check — redirect to main page if not logged in ───────────────────
(async function() {
  const token = localStorage.getItem('access_token');
  if (!token) { window.location.href = '/'; return; }
  try {
    const r = await fetch('/api/check-token', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token })
    });
    const data = await r.json();
    if (!data.ok) { localStorage.removeItem('access_token'); window.location.href = '/'; }
    const ctr = document.getElementById('ai-counter');
    if (ctr && data.aiUsed !== undefined) ctr.textContent = '🤖 ' + data.aiUsed + '/' + (data.aiLimit||50);
  } catch(e) {}
})();

// ─── SERVER ───────────────────────────────────────────────────────────────────
async function askServer(prompt, context) {
  const token = localStorage.getItem('access_token') || '';
  const resp = await fetch(SERVER + '/api/ask', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ token, prompt, context })
  });
  const data = await resp.json();
  if (!resp.ok || data.error) throw new Error(data.error || 'Ошибка сервера');
  return data.text;
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pane-' + name).classList.add('active');
}

const LS_SR = 'anat_sr';
const LS_SEEN = 'anat_seen';
function getSR() { try { return JSON.parse(localStorage.getItem(LS_SR)||'{}'); } catch(e){ return {}; } }
function saveSR(sr) { localStorage.setItem(LS_SR, JSON.stringify(sr)); }
function getSRrating(n) { const sr=getSR(); return sr[n]?sr[n].r:0; }
function getSeen() { try { return JSON.parse(localStorage.getItem(LS_SEEN)||'[]'); } catch(e){ return []; } }
function markSeen(n) { const s=getSeen(); if(!s.includes(n)){s.push(n); localStorage.setItem(LS_SEEN,JSON.stringify(s));} }

function rateSR(r) {
  const n = parseInt(document.getElementById('ref-select').value);
  if (!n) return;
  const sr = getSR(); sr[n] = { r, t: Date.now() }; saveSR(sr);
  [1,2,3].forEach(i => {
    const b = document.getElementById('sr-btn-'+i);
    if (b) b.classList.toggle('sel', i===r);
  });
  updateRefStats();
}
function showSRbtns(n) {
  const row = document.getElementById('sr-row');
  if (!row) return;
  row.classList.remove('hidden');
  const r = getSRrating(n);
  [1,2,3].forEach(i => {
    const b = document.getElementById('sr-btn-'+i);
    if (b) b.classList.toggle('sel', i===r);
  });
}

function updateRefStats() {
  const inSem = QUESTIONS.filter(q => q.semester === currentSemester);
  const seen = getSeen();
  document.getElementById('rs-total').textContent = inSem.length;
  document.getElementById('rs-seen').textContent = inSem.filter(q => seen.includes(q.n)).length;
  const sr = getSR(); let know=0,unsure=0,noknow=0;
  inSem.forEach(q => {
    const r = sr[q.n]?.r||0;
    if(r===3)know++; else if(r===2)unsure++; else if(r===1)noknow++;
  });
  document.getElementById('rs-know').textContent = know;
  document.getElementById('rs-unsure').textContent = unsure;
  document.getElementById('rs-noknow').textContent = noknow;
}

function onQSelect() {

}

function renderLegendTable(legend, caption) {

  }).join('');

async function getAnswer() {
  const n = parseInt(document.getElementById('ref-select').value);
  const q = QUESTIONS.find(q => q.n === n);
  if (!q) return;
  const btn = document.getElementById('ref-btn');
  const area = document.getElementById('ref-resp-area');
  const loading = document.getElementById('ref-loading');
  const body = document.getElementById('ref-resp-body');
  area.classList.remove('hidden'); body.innerHTML = '';

  if (typeof QUESTION_ANSWERS !== 'undefined' && QUESTION_ANSWERS[n]) {
    const html = md2html(QUESTION_ANSWERS[n]) + renderImageGallery(q.images);
    body.innerHTML = html;
    markSeen(n); showSRbtns(n); updateRefStats();
    return;
  }

  // Если для темы пока нет готового материала — собираем через AI (временно, до написания текста)
  loading.classList.remove('hidden');
  btn.disabled = true; btn.textContent = '⏳ Готовлю материал…';
  try {
    const text = await askServer(buildRefPrompt(q), '');
    const {mainText, sources} = parseSources(text);
    const html = md2html(mainText) + renderSources(sources) + renderImageGallery(q.images);
    body.innerHTML = html;
    markSeen(n);
    showSRbtns(n);
    updateRefStats();
  } catch(e) {
    body.innerHTML = '<p style="color:#dc2626">Ошибка: ' + e.message + '</p>';
    if (e.message.includes('доступ')) window.location.href = '/';
  }
  loading.classList.add('hidden');
  btn.disabled = false; btn.textContent = '📚 Получить материал по теме';
}

function md2html(text) {
  if (!text) return '';
  return marked.parse(text, { breaks: false, gfm: true });
}

function buildRefPrompt(q) {
  return `Ты — преподаватель кафедры анатомии человека, эксперт-экзаменатор. Составляешь учебный материал по теме для студента 1 курса лечебного факультета (учебник Привеса «Анатомия человека»).

Тема: ${q.q}

Структура ответа:
## Классификация / общая характеристика
## Подробное описание (части, ориентиры, отверстия — русские и латинские термины)
## Клиническое значение
## Как запомнить (мнемоники)

ОБЯЗАТЕЛЬНО латинская терминология везде, конкретные цифры (количество, размеры где уместно).

В конце:
ИСТОЧНИКИ:
- Привес М.Г. «Анатомия человека» | https://www.elsevierhealth.ru
- Анатомия Гиперлинк | https://meduniver.com/Medical/Anatom`;
}

function buildChatPrompt(question) {
  return `Ты — опытный преподаватель анатомии, объясняешь как умный друг-наставник студенту 1 курса лечебного факультета НГМУ, который готовится к занятиям по анатомии человека (по учебнику Привеса).

Вопрос студента: ${question}

Правила:
- Отвечай тепло, дружески, но точно и по делу
- Используй латинскую терминологию параллельно с русской
- Если что-то непонятно — объясни аналогиями, предложи мнемонику
- Используй markdown: **жирный** для ключевых терминов, ## заголовки, списки`;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  const btn = document.getElementById('chat-btn');
  const history = document.getElementById('chat-history');
  const loading = document.getElementById('chat-loading');

  const userBubble = document.createElement('div');
  userBubble.style.cssText = 'align-self:flex-end;background:#ffedd5;border-radius:12px 12px 2px 12px;padding:8px 12px;max-width:80%;font-size:14px;word-break:break-word';
  userBubble.textContent = msg;
  history.appendChild(userBubble);
  input.value = '';
  history.scrollTop = history.scrollHeight;

  btn.disabled = true; loading.classList.remove('hidden');
  try {
    const text = await askServer(buildChatPrompt(msg), '');
    const {mainText} = parseSources(text);
    const botBubble = document.createElement('div');
    botBubble.style.cssText = 'align-self:flex-start;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px 12px 12px 2px;padding:10px 14px;max-width:90%;font-size:13px';
    botBubble.classList.add('resp-body');
    botBubble.innerHTML = md2html(mainText);
    history.appendChild(botBubble);
  } catch(e) {
    const errBubble = document.createElement('div');
    errBubble.style.cssText = 'color:#dc2626;font-size:13px;padding:8px';
    errBubble.textContent = 'Ошибка: ' + e.message;
    history.appendChild(errBubble);
    if (e.message.includes('доступ')) window.location.href = '/';
  }
  loading.classList.add('hidden');
  btn.disabled = false;
  history.scrollTop = history.scrollHeight;
}

function parseSources(text) {
  const idx = text.search(/ИСТОЧНИКИ:|Источники:/);
  if (idx === -1) return { mainText: text, sources: [] };
  const mainText = text.slice(0, idx).trim();
  const rest = text.slice(idx + text.slice(idx).indexOf('\n') + 1);
  const sources = [];
  for (const line of rest.split('\n')) {
    const m = line.match(/[-–•*]?\s*(.+?)\s*\|\s*(https?:\/\/\S+)/);
    if (m) sources.push({ name: m[1].trim(), url: m[2].trim() });
  }
  return { mainText, sources };
}
function renderSources(sources) {
  if (!sources.length) return '';
  return `<div class="sources-block"><h5>📎 Источники</h5>${sources.map(s=>`<a href="${s.url}" target="_blank" rel="noopener">🔗 ${s.name}</a>`).join('')}</div>`;
}

let _explainTerm = '';

  setTimeout(() => {
    const sel = window.getSelection();
    const txt = sel ? sel.toString().trim() : '';
    const btn = document.getElementById('explain-btn');
    if (txt.length >= 3 && txt.length <= 150 && !txt.includes('\n')) {
      _explainTerm = txt;
      const rect = sel.getRangeAt(0).getBoundingClientRect();
      btn.style.left = Math.max(4, Math.min(rect.left + rect.width/2 - 60, window.innerWidth - 170)) + 'px';
      btn.style.top = (rect.top + window.scrollY - 38) + 'px';
      btn.style.display = 'block';
    } else { btn.style.display = 'none'; }
  }, 80);
}
document.addEventListener('mousedown', (e) => {
  const btn = document.getElementById('explain-btn');
  const panel = document.getElementById('explain-panel');
  if (e.target !== btn && !panel.contains(e.target)) btn.style.display = 'none';
});

  try {
    const text = await askServer(
      `Объясни анатомический или медицинский термин «${term}» студенту-медику 1 курса. 3–5 предложений. Если анатомическая структура — где находится, латинское название, к чему относится/прикрепляется, клиническое значение. Если процесс — суть и значение. Без вступлений.`, ''
    );
    document.getElementById('explain-text').innerHTML = text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
  } catch(e) { document.getElementById('explain-text').textContent = 'Ошибка: ' + e.message; }
}
function closeExplainPanel() {
  document.getElementById('explain-panel').classList.remove('open');
  document.getElementById('explain-overlay').style.display = 'none';
}
</script>
<!-- EXPLAIN BUTTON + PANEL -->
<button id="explain-btn" onclick="openExplainPanel()">💡 Что это?</button>
<div id="explain-overlay" onclick="closeExplainPanel()"></div>
<div id="explain-panel">
  <div style="padding:16px 20px;border-bottom:1px solid #7c2d12;display:flex;justify-content:space-between;align-items:center;background:#150601;flex-shrink:0;">
    <span style="font-weight:700;font-size:15px;color:#fdba8c">💡 Объяснение</span>
    <button onclick="closeExplainPanel()" style="background:none;border:none;color:#94785f;font-size:22px;cursor:pointer;line-height:1;">✕</button>
  </div>
  <div style="padding:20px;overflow-y:auto;flex:1;">
    <div id="explain-term" style="font-size:13px;color:#c2876b;margin-bottom:14px;font-style:italic;"></div>
    <div id="explain-text" style="font-size:14px;line-height:1.75;"></div>
  </div>
</div>
</body>
</html>
